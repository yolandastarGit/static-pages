<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">海外客户 CRM 全生命周期业务全景图</title>
  <desc id="desc">从客户触达到成交及持续经营的业务闭环，采用 Business Capability Map、Business Flow 与 Swimlane 混合布局。</desc>
  <defs>
    <linearGradient id="gBlue" x1="0" x2="1"><stop stop-color="#2f80ed"/><stop offset="1" stop-color="#65a6f8"/></linearGradient>
    <linearGradient id="gTeal" x1="0" x2="1"><stop stop-color="#2ab7a9"/><stop offset="1" stop-color="#6ad6c5"/></linearGradient>
    <linearGradient id="gOrange" x1="0" x2="1"><stop stop-color="#f59f3a"/><stop offset="1" stop-color="#f7c06a"/></linearGradient>
    <linearGradient id="gPurple" x1="0" x2="1"><stop stop-color="#7c66d9"/><stop offset="1" stop-color="#a993ee"/></linearGradient>
    <linearGradient id="gGreen" x1="0" x2="1"><stop stop-color="#42b883"/><stop offset="1" stop-color="#83d9aa"/></linearGradient>
    <linearGradient id="gSlate" x1="0" x2="1"><stop stop-color="#55708f"/><stop offset="1" stop-color="#8ea6bf"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#12345a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#15966b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f80ed"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7c66d9"/>
    </marker>
    <style>
      svg{font-family:"HarmonyOS Sans","Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#fff}
      .bg{fill:#fff}.grid{stroke:#edf2f7;stroke-width:1}.title{fill:#102f5e;font-size:34px;font-weight:800}.subtitle{fill:#53677f;font-size:17px}
      .column{fill:#fbfdff;stroke:#d9e6f6;stroke-width:1.2;rx:18;filter:url(#shadow)}.colTitle{fill:#fff;font-size:17px;font-weight:800}.colSub{fill:#edf6ff;font-size:11px;font-weight:600}
      .laneTag{fill:#edf4ff;stroke:#c9def6;stroke-width:1;rx:10}.laneText{fill:#305579;font-size:12px;font-weight:700}
      .module{fill:#fff;stroke:#b9d3f2;stroke-width:1.2;rx:12}.moduleTitle{fill:#163b68;font-size:14px;font-weight:800}.moduleText{fill:#60758f;font-size:11.2px}
      .action{fill:#f8fbff;stroke:#c7d9ee;stroke-width:1;rx:10}.actionText{fill:#254c73;font-size:12px;font-weight:700}.small{fill:#667b91;font-size:10.5px}
      .ai{fill:#edf7ff;stroke:#80bdf4;stroke-width:1.2;rx:12}.aiTitle{fill:#1769aa;font-size:13px;font-weight:800}
      .notice{fill:#fff8df;stroke:#e8bd4f;stroke-width:1.1;rx:12}.noticeText{fill:#77580c;font-size:12px;font-weight:800}
      .decision{fill:#fff;stroke:#f0aa4d;stroke-width:1.2}.decisionText{fill:#8a5a10;font-size:11.5px;font-weight:800}
      .support{fill:#f9fbff;stroke:#d7e4f3;stroke-width:1.1;rx:14}.supportTitle{fill:#193f68;font-size:14px;font-weight:800}.supportText{fill:#64778e;font-size:11px}
      .mainArrow{stroke:#15966b;stroke-width:2.3;fill:none;marker-end:url(#arrowGreen)}.ruleArrow{stroke:#2f80ed;stroke-width:1.8;fill:none;stroke-dasharray:6 5;marker-end:url(#arrowBlue)}
      .supportArrow{stroke:#7c66d9;stroke-width:1.8;fill:none;stroke-dasharray:7 5;marker-end:url(#arrowPurple)}
      .legend{fill:#4f647a;font-size:11px}.icon{font-size:18px;font-weight:700}
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <g opacity=".9">
    <path class="grid" d="M40 120H1560M40 240H1560M40 360H1560M40 480H1560M40 600H1560M40 720H1560M40 840H1560"/>
    <path class="grid" d="M80 100V860M320 100V860M560 100V860M800 100V860M1040 100V860M1280 100V860M1520 100V860"/>
  </g>

  <text x="800" y="52" text-anchor="middle" class="title">海外客户 CRM 全生命周期业务全景图</text>
  <text x="800" y="84" text-anchor="middle" class="subtitle">从客户触达到成交及持续经营的业务闭环</text>

  <!-- Columns -->
  <g id="columns">
    <rect x="50" y="122" width="240" height="585" class="column"/>
    <path d="M50 122h240v48H50z" fill="url(#gBlue)"/>
    <text x="170" y="153" text-anchor="middle" class="colTitle">1. 客户触达与消息接入</text>

    <rect x="305" y="122" width="240" height="585" class="column"/>
    <path d="M305 122h240v48H305z" fill="url(#gTeal)"/>
    <text x="425" y="153" text-anchor="middle" class="colTitle">2. AI识别与线索生成</text>

    <rect x="560" y="122" width="240" height="585" class="column"/>
    <path d="M560 122h240v48H560z" fill="url(#gOrange)"/>
    <text x="680" y="153" text-anchor="middle" class="colTitle">3. 销售跟进与线索转化</text>

    <rect x="815" y="122" width="240" height="585" class="column"/>
    <path d="M815 122h240v48H815z" fill="url(#gPurple)"/>
    <text x="935" y="153" text-anchor="middle" class="colTitle">4. 客户管理</text>

    <rect x="1070" y="122" width="240" height="585" class="column"/>
    <path d="M1070 122h240v48H1070z" fill="url(#gGreen)"/>
    <text x="1190" y="153" text-anchor="middle" class="colTitle">5. 合同管理</text>

    <rect x="1325" y="122" width="225" height="585" class="column"/>
    <path d="M1325 122h225v48H1325z" fill="url(#gSlate)"/>
    <text x="1437.5" y="153" text-anchor="middle" class="colTitle">6. 数据沉淀与经营分析</text>
  </g>

  <!-- Column 1 -->
  <g>
    <rect x="70" y="190" width="200" height="42" class="laneTag"/><text x="170" y="216" text-anchor="middle" class="laneText">业务阶段：客户触达</text>
    <rect x="78" y="250" width="184" height="70" class="module"/>
    <text x="96" y="276" class="moduleTitle">客户触达渠道</text>
    <text x="96" y="298" class="moduleText">Email / WhatsApp / 手动创建</text>
    <rect x="88" y="342" width="164" height="54" class="action"/>
    <text x="170" y="364" text-anchor="middle" class="actionText">账号绑定</text>
    <text x="170" y="383" text-anchor="middle" class="small">邮箱绑定 / WhatsApp绑定</text>
    <rect x="88" y="420" width="164" height="54" class="action"/>
    <text x="170" y="442" text-anchor="middle" class="actionText">消息进入 CRM</text>
    <text x="170" y="461" text-anchor="middle" class="small">来源站点与当前用户归属</text>
    <rect x="88" y="498" width="164" height="54" class="notice"/>
    <text x="170" y="521" text-anchor="middle" class="noticeText">🔔 接入提醒</text>
    <text x="170" y="540" text-anchor="middle" class="small">邮件未读 / 待处理</text>
    <path class="mainArrow" d="M170 320V342"/><path class="mainArrow" d="M170 396V420"/><path class="mainArrow" d="M170 474V498"/>
  </g>

  <!-- Column 2 -->
  <g>
    <rect x="325" y="190" width="200" height="42" class="laneTag"/><text x="425" y="216" text-anchor="middle" class="laneText">业务阶段：识别与建档</text>
    <rect x="333" y="250" width="184" height="70" class="ai"/>
    <text x="351" y="276" class="aiTitle">AI 识别与有效性判断</text>
    <text x="351" y="298" class="moduleText">邮件 AI 分析 / WhatsApp AI 分析</text>
    <polygon points="425,345 498,385 425,425 352,385" class="decision"/>
    <text x="425" y="381" text-anchor="middle" class="decisionText">是否有效线索</text>
    <text x="425" y="399" text-anchor="middle" class="decisionText">或需人工确认?</text>
    <rect x="343" y="450" width="164" height="54" class="action"/>
    <text x="425" y="472" text-anchor="middle" class="actionText">生成线索</text>
    <text x="425" y="491" text-anchor="middle" class="small">状态：待跟进</text>
    <rect x="343" y="528" width="164" height="54" class="action"/>
    <text x="425" y="550" text-anchor="middle" class="actionText">归属 / 公海池</text>
    <text x="425" y="569" text-anchor="middle" class="small">业务员 / 站点 / 公海分配</text>
    <path class="mainArrow" d="M425 320V345"/><path class="mainArrow" d="M425 425V450"/><path class="mainArrow" d="M425 504V528"/>
  </g>

  <!-- Column 3 -->
  <g>
    <rect x="580" y="190" width="200" height="42" class="laneTag"/><text x="680" y="216" text-anchor="middle" class="laneText">业务阶段：跟进与转化</text>
    <rect x="588" y="250" width="184" height="58" class="module"/>
    <text x="606" y="275" class="moduleTitle">线索管理</text>
    <text x="606" y="295" class="moduleText">线索列表 / 公海池 / 分配</text>
    <rect x="588" y="332" width="184" height="58" class="action"/>
    <text x="680" y="355" text-anchor="middle" class="actionText">销售跟进</text>
    <text x="680" y="374" text-anchor="middle" class="small">录入跟进 / 跟进日志 / 打标签</text>
    <polygon points="680,414 752,452 680,490 608,452" class="decision"/>
    <text x="680" y="448" text-anchor="middle" class="decisionText">是否进入</text>
    <text x="680" y="466" text-anchor="middle" class="decisionText">高意向?</text>
    <rect x="598" y="516" width="164" height="54" class="action"/>
    <text x="680" y="538" text-anchor="middle" class="actionText">转高意向客户</text>
    <text x="680" y="557" text-anchor="middle" class="small">失败可重试 / 已成交禁止</text>
    <rect x="598" y="594" width="164" height="54" class="notice"/>
    <text x="680" y="617" text-anchor="middle" class="noticeText">🔔 跟进通知</text>
    <text x="680" y="636" text-anchor="middle" class="small">状态变更 / 待跟进超时</text>
    <path class="mainArrow" d="M680 308V332"/><path class="mainArrow" d="M680 390V414"/><path class="mainArrow" d="M680 490V516"/><path class="mainArrow" d="M680 570V594"/>
  </g>

  <!-- Column 4 -->
  <g>
    <rect x="835" y="190" width="200" height="42" class="laneTag"/><text x="935" y="216" text-anchor="middle" class="laneText">业务阶段：客户资产化</text>
    <polygon points="935,250 1010,290 935,330 860,290" class="decision"/>
    <text x="935" y="286" text-anchor="middle" class="decisionText">匹配已有客户</text>
    <text x="935" y="304" text-anchor="middle" class="decisionText">或新建客户?</text>
    <rect x="843" y="354" width="184" height="58" class="module"/>
    <text x="861" y="379" class="moduleTitle">客户管理</text>
    <text x="861" y="399" class="moduleText">客户资料 / 联系人 / 线索历史</text>
    <rect x="843" y="436" width="184" height="74" class="ai"/>
    <text x="861" y="462" class="aiTitle">AI 客户洞察</text>
    <text x="861" y="484" class="moduleText">客户画像 / 企业工商信息</text>
    <text x="861" y="502" class="moduleText">参展资料 / 企业风险信息</text>
    <rect x="843" y="534" width="184" height="54" class="action"/>
    <text x="935" y="556" text-anchor="middle" class="actionText">客户持续跟进</text>
    <text x="935" y="575" text-anchor="middle" class="small">邮件 / WhatsApp / 跟进记录</text>
    <rect x="843" y="612" width="184" height="42" class="action"/>
    <text x="935" y="638" text-anchor="middle" class="actionText">客户转移</text>
    <path class="mainArrow" d="M935 330V354"/><path class="mainArrow" d="M935 412V436"/><path class="mainArrow" d="M935 510V534"/><path class="mainArrow" d="M935 588V612"/>
  </g>

  <!-- Column 5 -->
  <g>
    <rect x="1090" y="190" width="200" height="42" class="laneTag"/><text x="1190" y="216" text-anchor="middle" class="laneText">业务阶段：合同履约</text>
    <rect x="1098" y="250" width="184" height="58" class="module"/>
    <text x="1116" y="275" class="moduleTitle">新增合同</text>
    <text x="1116" y="295" class="moduleText">客户 / 关联线索 / 业务负责人</text>
    <rect x="1098" y="332" width="184" height="54" class="action"/>
    <text x="1190" y="354" text-anchor="middle" class="actionText">已签约</text>
    <text x="1190" y="373" text-anchor="middle" class="small">录入合同与附件</text>
    <rect x="1098" y="410" width="184" height="54" class="action"/>
    <text x="1190" y="432" text-anchor="middle" class="actionText">执行中</text>
    <text x="1190" y="451" text-anchor="middle" class="small">合同状态变更</text>
    <polygon points="1190,488 1262,526 1190,564 1118,526" class="decision"/>
    <text x="1190" y="522" text-anchor="middle" class="decisionText">是否完成</text>
    <text x="1190" y="540" text-anchor="middle" class="decisionText">履约?</text>
    <rect x="1098" y="590" width="184" height="54" class="notice"/>
    <text x="1190" y="613" text-anchor="middle" class="noticeText">🔔 合同通知</text>
    <text x="1190" y="632" text-anchor="middle" class="small">创建 / 状态变更 / 到期提醒</text>
    <path class="mainArrow" d="M1190 308V332"/><path class="mainArrow" d="M1190 386V410"/><path class="mainArrow" d="M1190 464V488"/><path class="mainArrow" d="M1190 564V590"/>
  </g>

  <!-- Column 6 -->
  <g>
    <rect x="1345" y="190" width="185" height="42" class="laneTag"/><text x="1437.5" y="216" text-anchor="middle" class="laneText">业务阶段：沉淀与复盘</text>
    <rect x="1350" y="250" width="175" height="58" class="module"/>
    <text x="1368" y="275" class="moduleTitle">成交 / 已完成</text>
    <text x="1368" y="295" class="moduleText">客户资产沉淀</text>
    <rect x="1350" y="332" width="175" height="58" class="action"/>
    <text x="1437.5" y="355" text-anchor="middle" class="actionText">持续经营</text>
    <text x="1437.5" y="374" text-anchor="middle" class="small">复购扩展 / 客户活跃度</text>
    <rect x="1350" y="414" width="175" height="74" class="ai"/>
    <text x="1368" y="440" class="aiTitle">经营分析</text>
    <text x="1368" y="462" class="moduleText">销售经营 / 获客分析</text>
    <text x="1368" y="480" class="moduleText">客户经营 / 转化率</text>
    <rect x="1350" y="512" width="175" height="58" class="action"/>
    <text x="1437.5" y="535" text-anchor="middle" class="actionText">数据闭环</text>
    <text x="1437.5" y="554" text-anchor="middle" class="small">线索 / 客户 / 合同 / 沟通记录</text>
    <path class="mainArrow" d="M1437.5 308V332"/><path class="mainArrow" d="M1437.5 390V414"/><path class="mainArrow" d="M1437.5 488V512"/>
  </g>

  <!-- Main flow between columns -->
  <path class="mainArrow" d="M270 447H305"/>
  <path class="mainArrow" d="M507 477C535 477 535 279 560 279"/>
  <path class="mainArrow" d="M762 543C795 543 795 290 860 290"/>
  <path class="mainArrow" d="M1027 561C1055 561 1055 279 1098 279"/>
  <path class="mainArrow" d="M1282 526C1314 526 1314 279 1350 279"/>

  <!-- Rule and support influence lines -->
  <path class="ruleArrow" d="M780 742C780 680 705 665 680 648"/>
  <path class="ruleArrow" d="M675 742C675 680 445 640 425 582"/>
  <path class="ruleArrow" d="M555 742C555 668 590 340 590 320"/>
  <path class="supportArrow" d="M1128 742C1128 690 1010 660 935 654"/>
  <path class="supportArrow" d="M1260 742C1260 680 1212 650 1190 644"/>

  <!-- Support capability map -->
  <g>
    <rect x="50" y="735" width="1500" height="108" class="support"/>
    <text x="78" y="768" class="supportTitle">系统支撑能力</text>

    <rect x="190" y="760" width="180" height="58" class="support"/>
    <text x="210" y="786" class="supportTitle">权限管理</text>
    <text x="210" y="806" class="supportText">用户管理 / 角色管理 / 菜单权限</text>

    <rect x="390" y="760" width="180" height="58" class="support"/>
    <text x="410" y="786" class="supportTitle">业务规则</text>
    <text x="410" y="806" class="supportText">系统参数 / 公海规则 / 转化规则</text>

    <rect x="590" y="760" width="180" height="58" class="support"/>
    <text x="610" y="786" class="supportTitle">AI 规则</text>
    <text x="610" y="806" class="supportText">AI 服务商 / 模型参数 / 分析能力</text>

    <rect x="790" y="760" width="180" height="58" class="support"/>
    <text x="810" y="786" class="supportTitle">系统设置</text>
    <text x="810" y="806" class="supportText">字典管理 / 站点配置 / 服务协议</text>

    <rect x="990" y="760" width="180" height="58" class="support"/>
    <text x="1010" y="786" class="supportTitle">消息中心</text>
    <text x="1010" y="806" class="supportText">通知规则 / 站内信 / 钉钉通知</text>

    <rect x="1190" y="760" width="180" height="58" class="support"/>
    <text x="1210" y="786" class="supportTitle">账号接入</text>
    <text x="1210" y="806" class="supportText">邮箱绑定 / WhatsApp绑定 / 钉钉账号</text>

    <rect x="1388" y="760" width="120" height="58" class="support"/>
    <text x="1410" y="786" class="supportTitle">数据资产</text>
    <text x="1410" y="806" class="supportText">跟进日志 / 历史记录</text>
  </g>

  <!-- Legend -->
  <g>
    <path class="mainArrow" d="M1040 865H1095"/><text x="1108" y="869" class="legend">主业务流程</text>
    <path class="ruleArrow" d="M1215 865H1270"/><text x="1283" y="869" class="legend">规则影响</text>
    <path class="supportArrow" d="M1380 865H1435"/><text x="1448" y="869" class="legend">系统支撑</text>
  </g>
</svg>
