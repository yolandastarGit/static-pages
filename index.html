<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>静态页面分享</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      max-width: 520px;
      width: 100%;
      padding: 2.5rem;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: .75rem; }
    p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
    code {
      background: #f0f2f8;
      padding: .2em .5em;
      border-radius: 6px;
      font-size: .9em;
    }
  </style>
</head>
<body>
  <main>
    <h1>静态页面已就绪</h1>
    <p>把 HTML 文件放到 <code>pages/</code> 目录并推送到 GitHub 后，即可通过公开链接分享。</p>
    <p>链接格式：<br><code>https://yolandastarGit.github.io/static-pages/pages/文件名.html</code></p>
  </main>
</body>
</html>
